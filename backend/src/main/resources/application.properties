# Application settings
server.port=8080

# Use H2 in-memory database (always seeded with products on startup)
# To switch to MySQL: change this to spring.profiles.active=mysql
# and ensure MySQL is running with fashion_db schema created
spring.profiles.active=

# Enable H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# File upload properties
file.upload-dir=uploads

# Spring Jackson config to ignore empty Hibernate proxies
spring.jackson.serialization.fail-on-empty-beans=false

# JWT Security Configurations
# 256-bit base64 encoded secret key: "fashionstoresecurekeyfashionstoresecurekeyfashionstoresecurekey"
jwt.secret=ZmFzaGlvbnN0b3Jlc2VjdXJla2V5ZmFzaGlvbnN0b3Jlc2VjdXJla2V5ZmFzaGlvbnN0b3Jlc2VjdXJla2V5
# 24 hours in milliseconds
jwt.expiration=86400000

# ==========================================
# Default H2 Database Configuration
# ==========================================
spring.datasource.url=jdbc:h2:mem:fashiondb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none

# Run schema.sql and data.sql on startup
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

