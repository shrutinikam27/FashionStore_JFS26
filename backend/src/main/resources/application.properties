# ==========================================
# Application Settings
# ==========================================
server.port=8080

# Use H2 in-memory database
spring.profiles.active=

# ==========================================
# H2 Database Configuration
# ==========================================
spring.datasource.url=jdbc:h2:mem:fashiondb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

# ==========================================
# File Upload
# ==========================================
file.upload-dir=uploads

# ==========================================
# Jackson Configuration
# ==========================================
spring.jackson.serialization.fail-on-empty-beans=false

# ==========================================
# JWT Configuration
# ==========================================
jwt.secret=ZmFzaGlvbnN0b3Jlc2VjdXJla2V5ZmFzaGlvbnN0b3Jlc2VjdXJla2V5ZmFzaGlvbnN0b3Jlc2VjdXJla2V5
jwt.expiration=86400000

# ==========================================
# Brevo SMTP Configuration
# ==========================================
spring.mail.host=${SPRING_MAIL_HOST:smtp-relay.brevo.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:nikamshruti27@gmail.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:}

spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=${SPRING_MAIL_STARTTLS_REQUIRED:true}
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Enable debug logs
spring.mail.properties.mail.debug=true

# ==========================================
# Default From Email
# ==========================================
spring.mail.from=nikamshruti27@gmail.com

# ==========================================
# Disable Resend (Using Gmail Only)
# ==========================================
