# ==========================================
# MySQL Database Profile Configurations
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/fashion_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Root@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

# Auto-run schema.sql and data.sql on MySQL
# Set to 'always' only on first run to seed the DB, then switch to 'never'
spring.sql.init.mode=never
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql
# Ignore duplicate insertion errors on subsequent restarts
spring.sql.init.continue-on-error=true
